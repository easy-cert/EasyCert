{% extends "base.html" %}
{% load static %}

{% block title %}Verify Identity • EasyCert{% endblock %}

{% block body %}

<!-- TOP BAR -->
<div class="fixed top-0 left-0 right-0 z-50 px-4 sm:px-6 py-3">
    <div class="max-w-md mx-auto flex items-center justify-between">
        <a href="{% url 'login' %}"
            class="flex items-center gap-x-2 px-4 py-2.5 bg-white/80 backdrop-blur-md hover:bg-white border border-white/60 rounded-2xl text-[#2C7BE5] font-semibold text-sm shadow-sm transition-all">
            <i class="fa-solid fa-arrow-left"></i>
            <span>Back to Login</span>
        </a>
        <button onclick="toggleDarkMode()" id="dark-mode-btn" title="Toggle Dark Mode"
            class="w-10 h-10 flex items-center justify-center rounded-2xl bg-white/80 backdrop-blur-md hover:bg-white border border-white/60 shadow-sm dark-toggle-btn transition-all text-[#2C7BE5]">
            <i id="dark-mode-icon" class="fa-solid fa-moon text-sm"></i>
        </button>
    </div>
</div>

<div class="min-h-screen flex items-center justify-center px-4 py-12 pt-20"
    style="background: linear-gradient(135deg, #F2F9FF 0%, #E0F0FF 100%);">
    <div class="max-w-md w-full">
        <div class="glass rounded-3xl p-8 sm:p-10 shadow-2xl">
            <div class="text-center mb-6">
                <a href="{% url 'home' %}" class="inline-block">
                    <img src="{% static 'Icon.png' %}" alt="EasyCert Logo"
                        class="mx-auto w-16 h-16 rounded-full mb-4 object-cover shadow-inner" />
                </a>
                <h3 class="text-2xl sm:text-3xl font-bold">Verification</h3>
                <p class="text-[#333333]/60 mt-1 text-sm">A 6-digit code has been sent to {{ user.email }}</p>
            </div>

            <form method="POST" class="space-y-6">
                {% csrf_token %}

                <div class="space-y-4">
                    <div class="flex justify-between items-center px-1">
                        <p
                            class="text-xs text-[#2C7BE5] font-semibold uppercase tracking-widest flex items-center gap-x-2">
                            <span class="w-4 h-px bg-[#2C7BE5] inline-block"></span>OTP Code
                        </p>
                        <span id="timer" class="text-[10px] font-bold text-[#2C7BE5] capitalize tracking-widest">5:00
                            remaining</span>
                    </div>

                    <input type="text" name="otp_code" maxlength="6" pattern="\d{6}" required autofocus
                        class="form-input w-full text-center text-3xl font-normal tracking-[0.3em] py-5"
                        placeholder="Enter 6-digit">
                </div>

                <div class="flex flex-col gap-3 pt-2">
                    <button type="submit" name="action" value="VERIFY"
                        class="w-full py-4 bg-gradient-to-r from-[#2C7BE5] to-[#00B894] hover:opacity-90 text-white font-bold text-base rounded-3xl transition-all flex items-center justify-center gap-x-2 shadow-lg shadow-[#2C7BE5]/20">
                        <i class="fa-solid fa-circle-check"></i> Verify & Login
                    </button>

                    <button type="submit" name="action" value="CANCEL"
                        class="w-full py-2 text-[#333333]/40 hover:text-[#333333]/60 font-bold text-[11px] transition-all text-center capitalize tracking-widest">
                        Cancel Attempt
                    </button>
                </div>
            </form>

            <div class="text-center mt-8">
                <p class="text-xs text-[#333333]/50">
                    Didn't receive the email? <button type="button"
                        class="text-[#2C7BE5] font-semibold hover:underline">Resend Code</button>
                </p>
            </div>
        </div>
    </div>
</div>

<style>
    .glass {
        background: rgba(255, 255, 255, 0.75);
        backdrop-filter: blur(40px);
        -webkit-backdrop-filter: blur(40px);
    }

    input::placeholder {
        color: rgba(51, 51, 51, 0.1);
    }
</style>

<script>
    let timeLeft = 300;
    const timerEl = document.getElementById('timer');
    const interval = setInterval(() => {
        timeLeft--;
        const m = Math.floor(timeLeft / 60);
        const s = timeLeft % 60;
        timerEl.textContent = `${m}:${s.toString().padStart(2, '0')} remaining`;
        if (timeLeft <= 0) {
            clearInterval(interval);
            timerEl.textContent = 'EXPIRED';
            timerEl.className = 'text-[10px] font-bold text-red-400 uppercase tracking-widest';
        }
    }, 1000);
</script>
{% endblock %}
